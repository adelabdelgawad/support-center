# Redis configuration with persistence settings
# This configuration enables AOF persistence for data durability

# Enable Append Only File (AOF) persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# Use fsync instead of the default fdatasync for better performance
aof-use-fsync yes

# fsync policy: every second for durability vs performance balance
appendfsync everysec

# Save data to disk every 900 seconds (15 minutes) if at least 1 key changed
save 900 1